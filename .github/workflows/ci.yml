name: CI

# Pull requests only. Pushes to main are already covered by the `test` job in
# release-please.yml, which gates the release via `needs: test` — running both here
# meant every main push executed typecheck/test/build twice and produced two separate
# checks both named "test".
#
# Deliberately NOT gated behind CLODEX_PUBLISH_ENABLED: that variable keeps the
# *release* machinery dormant outside the dedicated repo, but typecheck/test/build
# publish nothing, and repository variables do not resolve for pull_request runs from a
# fork — gating here would silently skip CI for external contributors, the exact failure
# this workflow exists to prevent.
on:
  pull_request:

permissions:
  contents: read

# A new push to a PR branch cancels the in-flight run for the previous commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # Corepack reads the pinned pnpm version from package.json's packageManager field.
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
