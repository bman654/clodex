name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    # Disabled until clodex lives in its own dedicated repo: repository variables are
    # unset by default, so this job is skipped everywhere until CLODEX_PUBLISH_ENABLED
    # is set to 'true' in the new repo's Settings → Variables.
    if: vars.CLODEX_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # corepack reads the pinned pnpm version from package.json's packageManager field
      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      # Gate the release on a green test + type-check + build before anything is published.
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # npm publish (not pnpm) keeps the proven NODE_AUTH_TOKEN + registry-url auth flow.
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CLODEX_NPM_TOKEN }}

      # Create a GitHub Release from the matching CHANGELOG.md section.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(node -e "const fs=require('fs');const cl=fs.readFileSync('CHANGELOG.md','utf8');const m=cl.match(/## \[[\d.]+\][^\n]*\n([\s\S]*?)(?=\n## \[|$)/);console.log(m?m[1].trim():'')")
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "$NOTES"
